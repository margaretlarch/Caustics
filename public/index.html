<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>caustics · 影的仪表盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f8f6f0; --text: #2c2416; --card: #fffdf7; --accent: #6b9ac4;
      --border: #e8e0d5; --warm: #d4a574; --shadow: 0 2px 8px rgba(0,0,0,0.05);
      --radius: 12px; --font: 'Georgia', 'Noto Serif SC', serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      line-height: 1.7; max-width: 800px; margin: 0 auto; padding: 20px;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a574' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .login-container { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
    .login-container h1 { font-size: 2rem; margin-bottom: 20px; color: var(--accent); }
    .login-container input {
      padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);
      width: 280px; font-size: 1rem; background: var(--card); text-align: center;
    }
    .login-container button {
      margin-top: 12px; padding: 10px 30px; border: none; background: var(--accent);
      color: white; border-radius: var(--radius); cursor: pointer; font-size: 1rem;
    }
    .error-msg { color: #c44; margin-top: 10px; font-size: 0.9rem; }
    .dashboard { display: none; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .card h2 { margin-bottom: 12px; color: var(--accent); font-size: 1.2rem; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status-dot.online { background: #4c9; }
    .status-dot.offline { background: #c44; }
    nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    nav button {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); cursor: pointer; font-family: var(--font);
    }
    nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    input[type="text"], input[type="password"], select {
      padding: 8px; border: 1px solid var(--border); border-radius: 6px;
      width: 100%; font-size: 0.9rem; background: var(--card); margin-bottom: 8px;
    }
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-warm { background: var(--warm); color: #fff; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; background: var(--accent); color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-container" id="loginBox">
    <h1>caustics</h1>
    <p style="color:#888;margin-bottom:20px;">影的仪表盘</p>
    <input type="password" id="passwordInput" placeholder="管理密码" />
    <button onclick="doLogin()">进入</button>
    <p class="error-msg" id="loginError"></p>
  </div>

  <div class="dashboard" id="dashboard">
    <nav>
      <button class="active" onclick="showPanel('status')">服务状态</button>
      <button onclick="showPanel('logs')">记录</button>
      <button onclick="showPanel('schedule')">待办</button>
      <button onclick="showPanel('diary')">日记</button>
      <button onclick="showPanel('settings')">设置</button>
    </nav>

    <!-- 状态面板 -->
    <div class="panel active" id="panel-status">
      <div class="card">
        <h2>服务状态</h2>
        <p><span class="status-dot online" id="statusDot"></span> <span id="statusText">检查中...</span></p>
        <p>最近活动：<span id="lastActivity">--</span></p>
        <p>当前时区：<span id="timezoneDisplay">--</span></p>
      </div>
    </div>

    <!-- 记录面板 -->
    <div class="panel" id="panel-logs">
      <div class="card">
        <h2>影的记录</h2>
        <div id="logsList">加载中...</div>
      </div>
    </div>

    <!-- 待办面板 -->
    <div class="panel" id="panel-schedule">
      <div class="card">
        <h2>待办清单</h2>
        <div id="scheduleList">加载中...</div>
      </div>
    </div>

    <!-- 日记面板 -->
    <div class="panel" id="panel-diary">
      <div class="card">
        <h2>Daily Log</h2>
        <div id="diaryList">加载中...</div>
      </div>
    </div>

    <!-- 设置面板 -->
    <div class="panel" id="panel-settings">
      <div class="card">
        <h3>API 配置</h3>
        <label>Provider</label>
        <select id="cfgProvider">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
        </select>
        <label>API Base URL</label>
        <input type="text" id="cfgBaseUrl" />
        <label>API Key</label>
        <input type="password" id="cfgApiKey" />
        <label>模型名称</label>
        <input type="text" id="cfgModelName" />
        <div class="btn-group">
          <button class="btn btn-warm" onclick="testConnection()">测试连接</button>
          <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
        </div>
        <p id="testResult" style="margin-top:10px;font-size:0.85rem;"></p>
      </div>
      <div class="card">
        <h3>Fallback 配置</h3>
        <label>Provider</label>
        <select id="cfgFbProvider">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
        </select>
        <label>API Base URL</label>
        <input type="text" id="cfgFbBaseUrl" />
        <label>API Key</label>
        <input type="password" id="cfgFbApiKey" />
        <label>模型名称</label>
        <input type="text" id="cfgFbModelName" />
      </div>
      <div class="card">
        <h3>时区设置</h3>
        <label>用户时区</label>
        <select id="cfgTimezone">
          <option value="auto">自动检测（推荐）</option>
          <option value="Asia/Shanghai">中国标准时间 (UTC+8)</option>
          <option value="Asia/Tokyo">日本标准时间 (UTC+9)</option>
          <option value="America/New_York">美国东部时间 (UTC-5)</option>
          <option value="America/Los_Angeles">美国太平洋时间 (UTC-8)</option>
          <option value="Europe/London">英国时间 (UTC+0)</option>
          <option value="Europe/Paris">欧洲中部时间 (UTC+1)</option>
          <option value="Australia/Sydney">澳大利亚东部时间 (UTC+10)</option>
        </select>
        <p style="font-size:0.8rem;color:#888;margin-top:6px;">
          选择「自动检测」时，影会根据你发消息的时间自动调整时区。
        </p>
      </div>
      <div class="card">
        <h3>时段设置</h3>
        <label>Check-in 开始（小时）</label>
        <input type="text" id="cfgCheckinStart" />
        <label>Check-in 结束（小时）</label>
        <input type="text" id="cfgCheckinEnd" />
        <label>安静开始（小时）</label>
        <input type="text" id="cfgQuietStart" />
        <label>安静结束（小时）</label>
        <input type="text" id="cfgQuietEnd" />
      </div>
    </div>
  </div>

  <script>
    const API = ''; // 同源，空字符串
    const SUPABASE_URL = 'https://xxxxx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOi...'; // 请替换为实际 anon key

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let authToken = localStorage.getItem('caustics_token') || '';

    async function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (data.token) {
          authToken = data.token;
          localStorage.setItem('caustics_token', authToken);
          document.getElementById('loginBox').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          initDashboard();
        } else {
          document.getElementById('loginError').textContent = '密码错误';
        }
      } catch (e) {
        document.getElementById('loginError').textContent = '连接失败';
      }
    }

    function authHeaders() { return { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' }; }

    async function initDashboard() {
      checkHealth();
      loadStatus();
      // 根据 hash 或默认显示面板
      const hash = location.hash.replace('#', '') || 'status';
      showPanel(hash);
          setInterval(() => {
      if (document.getElementById('dashboard').style.display !== 'none') {
        loadSettings();
      }
    }, 60000); // 每 60 秒刷新一次配置（包括时区）
    }

    async function checkHealth() {
      try {
        const res = await fetch(API + '/health');
        const data = await res.json();
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = '在线';
        document.getElementById('lastActivity').textContent = new Date(data.time).toLocaleString('zh-CN');
      } catch (e) {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = '休眠/离线';
      }
    }

    async function loadStatus() {
      const [logs, schedule, diary] = await Promise.all([
        supabase.from('shadow_logs').select('*').order('created_at', { ascending: false }).limit(20),
        supabase.from('shadow_schedule').select('*').order('created_at', { ascending: false }).limit(20),
        supabase.from('shadow_diary').select('*').order('date', { ascending: false }).limit(7),
      ]);
      renderLogs(logs.data || []);
      renderSchedule(schedule.data || []);
      renderDiary(diary.data || []);
      loadSettings();
    }

    function renderLogs(data) {
      if (data.length === 0) {
        document.getElementById('logsList').innerHTML = '<p>暂无记录。</p>';
        return;
      }
      const html = data.map(l => `<p><small>${new Date(l.created_at).toLocaleString('zh-CN')}</small> — ${escapeHtml(l.content?.substring(0, 120) || '')}</p>`).join('');
      document.getElementById('logsList').innerHTML = html;
    }

    function renderSchedule(data) {
      if (data.length === 0) {
        document.getElementById('scheduleList').innerHTML = '<p>暂无待办。</p>';
        return;
      }
      const html = data.map(s => {
        let statusBadge = s.status === 'done' ? '<span class="badge">已完成</span>' :
          s.status === 'cancelled' ? '<span class="badge" style="background:#999;">已取消</span>' :
          '<span class="badge" style="background:var(--warm);">待办</span>';
        let actions = '';
        if (s.status === 'pending') {
          actions = `<button class="btn btn-primary" style="font-size:0.75rem;padding:2px 8px;" onclick="markDone('${s.id}')">标记完成</button>`;
        }
        return `<p>${statusBadge} <strong>${escapeHtml(s.title)}</strong> ${s.description ? '— ' + escapeHtml(s.description) : ''} <small>${s.remind_at ? '提醒: ' + new Date(s.remind_at).toLocaleString('zh-CN') : ''}</small> ${actions}</p>`;
      }).join('');
      document.getElementById('scheduleList').innerHTML = html;
    }

    function renderDiary(data) {
      if (data.length === 0) {
        document.getElementById('diaryList').innerHTML = '<p>暂无日记。</p>';
        return;
      }
      const html = data.map(d => `<div class="card"><strong>${d.date}</strong><p>${escapeHtml(d.summary || '暂无摘要')}</p></div>`).join('');
      document.getElementById('diaryList').innerHTML = html;
    }

    async function markDone(id) {
      try {
        const res = await fetch(API + '/api/schedule/' + id, {
          method: 'PATCH', headers: authHeaders(),
          body: JSON.stringify({ status: 'done' }),
        });
        if (res.ok) loadStatus();
      } catch (e) { alert('操作失败'); }
    }

    async function loadSettings() {
      try {
        const res = await fetch(API + '/api/config', { headers: authHeaders() });
        const cfg = await res.json();
        document.getElementById('cfgProvider').value = cfg.api_provider || 'anthropic';
        document.getElementById('cfgBaseUrl').value = cfg.api_base_url || '';
        document.getElementById('cfgApiKey').value = cfg.api_key || '';
        document.getElementById('cfgModelName').value = cfg.model_name || '';
        document.getElementById('cfgFbProvider').value = cfg.fallback_provider || 'deepseek';
        document.getElementById('cfgFbBaseUrl').value = cfg.fallback_api_base_url || '';
        document.getElementById('cfgFbApiKey').value = cfg.fallback_api_key || '';
        document.getElementById('cfgFbModelName').value = cfg.fallback_model_name || '';
        document.getElementById('cfgCheckinStart').value = cfg.checkin_start_hour || '10';
        document.getElementById('cfgCheckinEnd').value = cfg.checkin_end_hour || '23';
        document.getElementById('cfgQuietStart').value = cfg.quiet_start_hour || '3';
        document.getElementById('cfgQuietEnd').value = cfg.quiet_end_hour || '10';
        document.getElementById('cfgTimezone').value = cfg.timezone || 'auto';
                // 更新时区显示
        const tz = cfg.timezone || 'auto';
        const offset = cfg.timezone_offset || '';
        document.getElementById('timezoneDisplay').textContent = formatTimezone(tz, offset);
      } catch (e) { console.warn('配置加载失败:', e.message); }
    }

    async function saveConfig() {
      const payload = {
        api_provider: document.getElementById('cfgProvider').value,
        api_base_url: document.getElementById('cfgBaseUrl').value,
        api_key: document.getElementById('cfgApiKey').value,
        model_name: document.getElementById('cfgModelName').value,
        fallback_provider: document.getElementById('cfgFbProvider').value,
        fallback_api_base_url: document.getElementById('cfgFbBaseUrl').value,
        fallback_api_key: document.getElementById('cfgFbApiKey').value,
        fallback_model_name: document.getElementById('cfgFbModelName').value,
        checkin_start_hour: document.getElementById('cfgCheckinStart').value,
        checkin_end_hour: document.getElementById('cfgCheckinEnd').value,
        quiet_start_hour: document.getElementById('cfgQuietStart').value,
        quiet_end_hour: document.getElementById('cfgQuietEnd').value,
        timezone: document.getElementById('cfgTimezone').value,   // 新增
      };
      try {
        const res = await fetch(API + '/api/config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.success) alert('配置已保存');
           loadSettings(); // 刷新状态面板中的时区显示
        else alert('保存失败: ' + (data.error || ''));
      } catch (e) { alert('请求失败: ' + e.message); }
    }

    async function testConnection() {
      const payload = {
        provider: document.getElementById('cfgProvider').value,
        api_base_url: document.getElementById('cfgBaseUrl').value,
        api_key: document.getElementById('cfgApiKey').value,
        model_name: document.getElementById('cfgModelName').value,
      };
      document.getElementById('testResult').textContent = '测试中...';
      try {
        const res = await fetch(API + '/api/config/test-connection', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        document.getElementById('testResult').textContent = data.success
          ? `连接成功！延迟 ${data.latency_ms}ms`
          : `连接失败: ${data.error}`;
      } catch (e) {
        document.getElementById('testResult').textContent = '请求失败: ' + e.message;
      }
    }

    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      const panel = document.getElementById('panel-' + name);
      if (panel) panel.classList.add('active');
      const btn = document.querySelector(`nav button[onclick*="${name}"]`);
      if (btn) btn.classList.add('active');
            if (name === 'status') {
        checkHealth();
        loadSettings();  // 确保时区显示
      if (name === 'logs' || name === 'schedule' || name === 'diary') loadStatus();
      if (name === 'settings') loadSettings();
      location.hash = name;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function formatTimezone(timezone, offset) {
  if (timezone && timezone !== 'auto') {
    return timezone + ' (手动)';
  }
  if (offset || offset === '0') {
    const off = parseInt(offset, 10);
    if (isNaN(off)) return '偏移未知';
    const sign = off >= 0 ? '+' : '-';
    const hours = Math.floor(Math.abs(off) / 60);
    const mins = Math.abs(off) % 60;
    let str = 'UTC' + sign + hours;
    if (mins > 0) str += ':' + String(mins).padStart(2, '0');
    return str + ' (自动检测)';
  }
  return '未设置';
}

    // 自动登录（已有有效 token）
    (function () {
      if (authToken) {
        // token 在内存重启后失效，但仍尝试
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        initDashboard();
      }
    })();
  </script>
</body>
</html>
